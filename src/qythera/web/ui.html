<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Qythera</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#09090b;color:#fafafa;font-family:system-ui,sans-serif;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 40%,rgba(124,58,237,.06),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(59,130,246,.04),transparent 50%),#09090b}
.g{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:14px}
.mu{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(59,130,246,.08));border:1px solid rgba(124,58,237,.1);border-radius:14px 14px 4px 14px;padding:10px 14px;max-width:82%;margin-left:auto}
.ma{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px 14px 14px 4px;padding:10px 14px;max-width:88%}
.ib{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:10px 14px;transition:border-color .3s}
.ib:focus-within{border-color:rgba(124,58,237,.4);box-shadow:0 0 0 2px rgba(124,58,237,.1)}
.d{display:inline-block;width:6px;height:6px;border-radius:50%;background:#a78bfa;margin:0 2px;animation:k 1.4s ease-in-out infinite;opacity:.4}
.d:nth-child(2){animation-delay:.15s}.d:nth-child(3){animation-delay:.3s}
@keyframes k{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1.1)}}
@keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:8px}
@media(max-width:768px){.mu,.ma{max-width:92%!important;padding:8px 10px}body{font-size:15px}}
@media(hover:none)and(pointer:coarse){button{min-height:44px;min-width:44px}}
</style><meta name="theme-color" content="#09090b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Qythera">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
</head><body>
<div class="bg"></div>
<div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column">
<div class="g" style="margin:6px;padding:8px 14px;display:flex;align-items:center;gap:8px">
<div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="color:white;font-weight:700;font-size:12px">Q</span></div>
<div style="font-weight:600;font-size:13px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Qythera</div>
<div style="margin-left:auto;font-size:10px;color:#52525b" id="n">0</div>
</div>
<div id="m" style="flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px">
<div id="w" style="text-align:center;padding:30px 12px">
<div style="width:64px;height:64px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(124,58,237,.25);animation:f 5s ease-in-out infinite"><span style="font-size:24px">✦</span></div>
<h2 style="font-size:18px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Qythera</h2>
<p style="color:#52525b;font-size:12px;max-width:280px;margin:0 auto 16px">Ask about coding, science, math.</p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-width:280px;margin:0 auto">
<button class="g" style="padding:10px;text-align:left;cursor:pointer;border:none" onclick="S('Write a Python sorting algorithm')">💻 Sorting</button>
<button class="g" style="padding:10px;text-align:left;cursor:pointer;border:none" onclick="S('Explain transformers')">🧠 Transformers</button>
<button class="g" style="padding:10px;text-align:left;cursor:pointer;border:none" onclick="S('What is machine learning?')">🔬 ML</button>
<button class="g" style="padding:10px;text-align:left;cursor:pointer;border:none" onclick="S('What is 2+2?')">🔢 Math</button>
</div></div></div>
<div style="padding:6px 10px 10px">
<div class="ib" style="display:flex;align-items:end;gap:6px">
<textarea id="i" placeholder="Message..." rows="1" style="flex:1;background:transparent;border:none;color:white;outline:none;resize:none;font-size:13px;padding:3px 0;max-height:120px" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();S()}"></textarea>
<button onclick="S()" style="padding:8px 14px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;color:white;cursor:pointer;flex-shrink:0;font-size:14px">➤</button>
</div></div></div>
<script>
var API='/v1/chat/completions',n=0;
function S(t){var i=document.getElementById('i');var m=t||i.value.trim();if(!m)return;if(t)i.value='';var w=document.getElementById('w');if(w)w.remove();var d=document.getElementById('m');
var u=document.createElement('div');u.className='mu';u.innerHTML='<div style="font-size:12px;white-space:pre-wrap;word-break:break-word">'+H(m)+'</div>';d.appendChild(u);
var ty=document.createElement('div');ty.className='ma';ty.innerHTML='<span class="d"></span><span class="d"></span><span class="d"></span>';d.appendChild(ty);d.scrollTop=d.scrollHeight;
fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:m}]})}).then(function(r){return r.json()}).then(function(d){
ty.remove();var r=d.choices[0].message.content;var b=document.createElement('div');b.className='ma';b.innerHTML='<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px"><div style="width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="font-size:7px;color:white;font-weight:700">Q</span></div><span style="font-size:10px;color:rgba(167,139,250,.7)">Vaelon</span></div><div style="font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word">'+F(r)+'</div>';d.appendChild(b);d.scrollTop=d.scrollHeight;n++;document.getElementById('n').textContent=n}).catch(function(e){ty.remove();d.appendChild(document.createElement('div')).className='ma';d.lastChild.innerHTML='<div style="color:#ef4444;font-size:12px">'+e.message+'</div>';d.scrollTop=d.scrollHeight})}
function H(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function F(t){return H(t).replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre style="background:rgba(0,0,0,.4);border-radius:8px;padding:10px;overflow-x:auto;margin:6px 0"><code style="font-size:11px;color:#a5f3fc">$2</code></pre>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')}
document.getElementById('i').focus();
</script><script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(r=>console.log('SW:',r.scope)).catch(()=>{});
}
if('Notification' in window && Notification.permission==='default'){
  Notification.requestPermission();
}
</script>
</body></html>
