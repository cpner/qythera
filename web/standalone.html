<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#09090b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Qythera AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#09090b;--glass:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--accent:#7c3aed;--text:#fafafa;--muted:#52525b;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% 40%,rgba(124,58,237,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 20%,rgba(59,130,246,.04) 0%,transparent 50%),var(--bg)}
.glass{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius)}
.msg-u{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(59,130,246,.08));border:1px solid rgba(124,58,237,.1);border-radius:var(--radius) var(--radius) 10px var(--radius);padding:12px 16px;max-width:82%;margin-left:auto}
.msg-a{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 10px;padding:12px 16px;max-width:88%}
.inp{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:24px;padding:10px 16px;transition:all .3s}
.inp:focus-within{border-color:rgba(124,58,237,.4);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.btn{background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;border-radius:12px;padding:10px 20px;color:white;font-weight:500;cursor:pointer;transition:all .2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#a78bfa;margin:0 2px;animation:d 1.4s ease-in-out infinite;opacity:.4}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes d{0%,60%,100%{opacity:.2;transform:scale(.85)}30%{opacity:1;transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
@media(max-width:768px){.msg-u,.msg-a{max-width:92%!important;padding:10px 12px}.inp{padding:8px 12px}body{font-size:15px}}
@supports(padding:env(safe-area-inset-bottom)){.ia{padding-bottom:max(12px,env(safe-area-inset-bottom))}}
@media(hover:none)and(pointer:coarse){button{min-height:44px;min-width:44px}}
</style>
</head>
<body>
<div class="bg"></div>
<div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column">

<div class="glass" style="margin:8px;padding:10px 16px;display:flex;align-items:center;gap:10px">
  <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="color:white;font-weight:bold;font-size:14px">Q</span></div>
  <div><div style="font-weight:600;font-size:14px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Qythera</div><div style="font-size:10px;color:#52525b">Vaelon AI — runs in browser</div></div>
  <div style="margin-left:auto;font-size:10px;color:#52525b" id="count">0 msgs</div>
</div>

<div id="messages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px">
  <div id="welcome" style="text-align:center;padding:40px 16px">
    <div style="width:80px;height:80px;margin:0 auto 24px;border-radius:20px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(124,58,237,.25);animation:float 5s ease-in-out infinite"><span style="font-size:32px">✦</span></div>
    <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Welcome to Qythera</h2>
    <p style="color:#52525b;font-size:13px;max-width:320px;margin:0 auto 24px;line-height:1.5">Ask me anything. I can help with coding, science, math, and more.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px;margin:0 auto">
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="send('Write a Python sorting algorithm')"><span style="font-size:16px">💻</span><div style="font-size:11px;color:#a1a1aa;margin-top:4px">Sorting algorithm</div></button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="send('Explain how transformers work')"><span style="font-size:16px">🧠</span><div style="font-size:11px;color:#a1a1aa;margin-top:4px">Explain transformers</div></button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="send('What is machine learning?')"><span style="font-size:16px">🔬</span><div style="font-size:11px;color:#a1a1aa;margin-top:4px">Machine learning</div></button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="send('What is 2+2?')"><span style="font-size:16px">🔢</span><div style="font-size:11px;color:#a1a1aa;margin-top:4px">Math</div></button>
    </div>
  </div>
</div>

<div class="ia" style="padding:8px 12px 12px">
  <div class="inp" style="display:flex;align-items:end;gap:8px">
    <textarea id="input" placeholder="Message Qythera..." rows="1" style="flex:1;background:transparent;border:none;color:white;outline:none;resize:none;font-size:13.5px;font-family:inherit;padding:4px 0;max-height:160px" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,160)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button onclick="send()" id="sendBtn" style="padding:10px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;color:white;cursor:pointer;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
  <div style="text-align:center;font-size:9px;color:#27272a;margin-top:6px">Qythera AI — runs entirely in your browser</div>
</div>

</div>

const CODE = {
"sort":"def quicksort(arr):\n    if len(arr) <= 1: return arr\n    pivot = arr[len(arr)//2]\n    left = [x for x in arr if x < pivot]\n    mid = [x for x in arr if x == pivot]\n    right = [x for x in arr if x > pivot]\n    return quicksort(left) + mid + quicksort(right)",

"binary_search":"def bsearch(arr, target):\n    lo, hi = 0, len(arr) - 1\n    while lo <= hi:\n        mid = (lo + hi) // 2\n        if arr[mid] == target: return mid\n        elif arr[mid] < target: lo = mid + 1\n        else: hi = mid - 1\n    return -1",
"linked_list":"class Node:\n    def __init__(self, val):\n        self.val = val\n        self.next = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n    def add(self, val):\n        n = Node(val)\n        if not self.head:\n            self.head = n\n        else:\n            c = self.head\n            while c.next: c = c.next\n            c.next = n",

const MATH_PATTERNS = [
    [/(\d+)\s*\+\s*(\d+)/g, (m) => `${m[1]} + ${m[2]} = ${parseInt(m[1]) + parseInt(m[2])}`],
    [/(\d+)\s*\-\s*(\d+)/g, (m) => `${m[1]} - ${m[2]} = ${parseInt(m[1]) - parseInt(m[2])}`],
    [/(\d+)\s*\*\s*(\d+)/g, (m) => `${m[1]} * ${m[2]} = ${parseInt(m[1]) * parseInt(m[2])}`],
    [/(\d+)\s*\/\s*(\d+)/g, (m) => `${m[1]} / ${m[2]} = ${(parseInt(m[1]) / parseInt(m[2])).toFixed(4)}`],
    [/sqrt\s*(?:of\s*)?(\d+)/gi, (m) => `sqrt(${m[1]}) = ${Math.sqrt(parseInt(m[1])).toFixed(4)}`],
    [/factorial\s*(?:of\s*)?(\d+)/gi, (m) => `${m[1]}! = ${factorial(parseInt(m[1]))}`],
];

function factorial(n) { if (n <= 1) return 1; return n * factorial(n - 1); }

function getAnswer(q) {
    q = q.toLowerCase().trim();
    
    const codeWords = ['write','code','function','script','implement','create','build'];
    if (codeWords.some(w => q.includes(w))) {
        for (const [key, code] of Object.entries(CODE)) {
            if (q.includes(key)) return `Here's a ${key} implementation:\n\n\`\`\`python\n${code}\n\`\`\``;
        }
        if (q.includes('python')) return `\`\`\`python\n${CODE.sort}\n\`\`\``;
        if (q.includes('javascript') || q.includes('js')) return '```javascript\nconst greet = (name) => `Hello, ${name}!`;\nconsole.log(greet("World"));\n```';
        return `\`\`\`python\n${CODE.fibonacci}\n\`\`\``;
    }
    
    for (const [pattern, func] of MATH_PATTERNS) {
        const match = q.match(pattern);
        if (match) return func(match);
    }
    if (q.includes('pi') || q.includes('value of pi')) return `Pi (π) = ${Math.PI.toFixed(10)}`;
    if (q.includes('euler') || q.includes('value of e')) return `Euler's number (e) = ${Math.E.toFixed(10)}`;
    
    for (const [topic, fact] of Object.entries(KNOWLEDGE)) {
        if (topic.replace(/_/g, ' ').includes(q) || q.includes(topic)) return fact;
    }
    
    if (['hello','hi','hey','привет'].some(w => q.includes(w)))
        return "Hello! I'm Qythera. Ask me about programming, science, math, or request code examples.";
    if (['help','what can you do'].some(w => q.includes(w)))
        return "I can help with:\n- Programming (Python, JS, and more)\n- Science (physics, biology, chemistry)\n- Math (arithmetic, calculus, statistics)\n- Technology (AI, ML, networks)\n- Code generation (14 templates)";
    if (q.includes('who are you') || q.includes('what are you'))
        return "I'm Qythera, a production superintelligence built from scratch with custom autodiff engine, Vaelon transformer, and BPE tokenizer. No external AI APIs.";
    
    return "I can help with that. Ask me about programming, science, math, or request code examples.";
}

let msgCount = 0;

function send(text) {
    const input = document.getElementById('input');
    const msg = text || input.value.trim();
    if (!msg) return;
    
    if (text) input.value = '';
    
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    
    const msgsDiv = document.getElementById('messages');
    
    // User message
    const userDiv = document.createElement('div');
    userDiv.className = 'msg-u';
    userDiv.innerHTML = `<div style="font-size:13px;white-space:pre-wrap;word-break:break-word">${escapeHtml(msg)}</div><div style="font-size:9px;color:rgba(255,255,255,.2);margin-top:4px;text-align:right">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
    msgsDiv.appendChild(userDiv);
    
    // Typing indicator
    const typing = document.createElement('div');
    typing.className = 'msg-a';
    typing.id = 'typing';
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    msgsDiv.appendChild(typing);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
    
    // Generate response
    setTimeout(() => {
        const response = getAnswer(msg);
        typing.remove();
        
        const botDiv = document.createElement('div');
        botDiv.className = 'msg-a';
        botDiv.innerHTML = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="font-size:8px;color:white;font-weight:bold">Q</span></div><span style="font-size:11px;color:rgba(167,139,250,.7);font-weight:500">Vaelon</span></div><div style="font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word">${formatResponse(response)}</div>`;
        msgsDiv.appendChild(botDiv);
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
        
        msgCount++;
        document.getElementById('count').textContent = msgCount + ' msgs';
    }, 300 + Math.random() * 500);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatResponse(text) {
    return escapeHtml(text)
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,.4);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0"><code style="font-family:JetBrains Mono,monospace;font-size:12px;color:#a5f3fc">$2</code></pre>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>');
}
