    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g filter="url(#shadow)" transform="translate(256,256)">
    <text x="0" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="200" font-weight="800" fill="white" opacity="0.95">Q</text>
  </g>
  <circle cx="256" cy="140" r="8" fill="url(#glow)" opacity="0.6"/>
  <circle cx="256" cy="140" r="3" fill="white" opacity="0.9"/>
