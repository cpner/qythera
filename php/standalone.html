<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Qythera AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#09090b;color:#fafafa;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 40%,rgba(124,58,237,.06),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(59,130,246,.04),transparent 50%),#09090b}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:16px}
.mu{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(59,130,246,.08));border:1px solid rgba(124,58,237,.1);border-radius:16px 16px 4px 16px;padding:12px 16px;max-width:82%;margin-left:auto}
.ma{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px 16px 16px 4px;padding:12px 16px;max-width:88%}
.ib{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:10px 16px;transition:all .3s}
.ib:focus-within{border-color:rgba(124,58,237,.4);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#a78bfa;margin:0 2px;animation:d 1.4s ease-in-out infinite;opacity:.4}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes d{0%,60%,100%{opacity:.2;transform:scale(.85)}30%{opacity:1;transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
@media(max-width:768px){.mu,.ma{max-width:92%!important;padding:10px 12px}.ib{padding:8px 12px}body{font-size:15px}}
@media(hover:none)and(pointer:coarse){button{min-height:44px;min-width:44px}}
</style>
</head>
<body>
<div class="bg"></div>
<div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column">
<div class="glass" style="margin:8px;padding:10px 16px;display:flex;align-items:center;gap:10px">
  <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="color:white;font-weight:bold;font-size:14px">Q</span></div>
  <div><div style="font-weight:600;font-size:14px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Qythera</div><div style="font-size:10px;color:#52525b">Vaelon AI</div></div>
  <div style="margin-left:auto;font-size:10px;color:#52525b" id="cnt">0</div>
</div>
<div id="msgs" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px">
  <div id="wel" style="text-align:center;padding:40px 16px">
    <div style="width:80px;height:80px;margin:0 auto 24px;border-radius:20px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(124,58,237,.25);animation:float 5s ease-in-out infinite"><span style="font-size:32px">✦</span></div>
    <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Welcome to Qythera</h2>
    <p style="color:#52525b;font-size:13px;max-width:320px;margin:0 auto 24px">Ask me anything about coding, science, math, and more.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px;margin:0 auto">
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('Write a Python sorting algorithm')">💻 Sorting</button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('Explain transformers')">🧠 Transformers</button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('What is machine learning?')">🔬 ML</button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('What is 2+2?')">🔢 Math</button>
    </div>
  </div>
</div>
<div style="padding:8px 12px 12px">
  <div class="ib" style="display:flex;align-items:end;gap:8px">
    <textarea id="inp" placeholder="Message Qythera..." rows="1" style="flex:1;background:transparent;border:none;color:white;outline:none;resize:none;font-size:13.5px;padding:4px 0;max-height:160px" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,160)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();S()}"></textarea>
    <button onclick="S()" style="padding:10px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;color:white;cursor:pointer;flex-shrink:0">➤</button>
  </div>
  <div style="text-align:center;font-size:9px;color:#27272a;margin-top:6px">Qythera AI — runs in your browser</div>
</div>
</div>
<script>
var K={"python":"Python is a high-level programming language created by Guido van Rossum in 1991. It emphasizes code readability with significant indentation.","javascript":"JavaScript is a programming language for web development. It runs in browsers and servers via Node.js.","transformer":"Transformers use self-attention to process sequences. Introduced in Attention Is All You Need (2017).","neural_network":"A neural network is a computing system inspired by biological neurons. Trained via backpropagation.","machine_learning":"Machine learning: systems learn patterns from data. Types: supervised, unsupervised, reinforcement.","git":"Git is a distributed version control system. Commands: init, add, commit, push, pull, branch, merge.","docker":"Docker packages apps in containers. Commands: build, run, pull, push.","quantum":"Quantum computing uses qubits in superposition. Enables exponential speedup.","physics":"Newton laws: F=ma. Conservation of energy. E=mc2 from relativity.","math":"Algebra uses symbols for numbers. Calculus studies change and accumulation.","ai":"Artificial Intelligence: systems performing tasks requiring human intelligence.","llm":"Large Language Models: neural networks trained on text to generate coherent text.","attention":"Attention computes weighted importance of tokens. Multi-head runs parallel operations.","cnn":"CNN uses filters to detect patterns. Great for images, speech, time series.","nlp":"Natural Language Processing: computers understanding human language.","evolution":"Evolution by natural selection: organisms with favorable traits survive and reproduce more.","photosynthesis":"Photosynthesis: 6CO2 + 6H2O + light -> C6H12O6 + 6O2.","dna":"DNA stores genetic information as a double helix. Bases: A, T, G, C.","internet":"Internet connects computers via TCP/IP. HTTP requests fetch web pages.","blockchain":"Blockchain: distributed ledger recording transactions. Each block hashes the previous."};
var C={"sort":"def quicksort(arr):\n    if len(arr) <= 1: return arr\n    pivot = arr[len(arr)//2]\n    return quicksort([x for x in arr if x < pivot]) + [x for x in arr if x == pivot] + quicksort([x for x in arr if x > pivot])","fib":"def fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        a, b = b, a + b\n    return a","bsearch":"def bsearch(arr, t):\n    lo, hi = 0, len(arr)-1\n    while lo <= hi:\n        mid = (lo+hi)//2\n        if arr[mid] == t: return mid\n        elif arr[mid] < t: lo = mid+1\n        else: hi = mid-1\n    return -1","api":"from fastapi import FastAPI\napp = FastAPI()\n@app.get('/items/{id}')\ndef get(id): return {'id': id}","db":"import sqlite3\nconn = sqlite3.connect('db.sqlite')\nc = conn.cursor()\nc.execute('CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT)')\nconn.commit()","ml":"from sklearn.ensemble import RandomForestClassifier\nfrom sklearn.model_selection import train_test_split\nX_tr, X_te, y_tr, y_te = train_test_split(X, y)\nmodel = RandomForestClassifier().fit(X_tr, y_tr)\nprint(f'Accuracy: {model.score(X_te, y_te):.2%}')"};

function S(t){var i=document.getElementById('inp');var m=t||i.value.trim();if(!m)return;if(t)i.value='';var w=document.getElementById('wel');if(w)w.remove();var d=document.getElementById('msgs');
var u=document.createElement('div');u.className='mu';u.innerHTML='<div style="font-size:13px;white-space:pre-wrap;word-break:break-word">'+H(m)+'</div>';d.appendChild(u);
var ty=document.createElement('div');ty.className='ma';ty.id='ty';ty.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';d.appendChild(ty);d.scrollTop=d.scrollHeight;
setTimeout(function(){var r=G(m);ty.remove();var b=document.createElement('div');b.className='ma';b.innerHTML='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="font-size:8px;color:white;font-weight:bold">Q</span></div><span style="font-size:11px;color:rgba(167,139,250,.7)">Vaelon</span></div><div style="font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word">'+F(r)+'</div>';d.appendChild(b);d.scrollTop=d.scrollHeight;document.getElementById('cnt').textContent=parseInt(document.getElementById('cnt').textContent)+1},200+Math.random()*400)}

function H(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function F(t){return H(t).replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre style="background:rgba(0,0,0,.4);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0"><code style="font-size:12px;color:#a5f3fc">$2</code></pre>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/`(.*?)`/g,'<code style="background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')}

function G(q){q=q.toLowerCase().trim();
var cw=['write','code','function','script','implement','create','build'];
if(cw.some(function(w){return q.indexOf(w)!==-1})){
for(var k in C)if(q.indexOf(k)!==-1)return'Here is a '+k+':\n\n```python\n'+C[k]+'\n```';
if(q.indexOf('python')!==-1)return'```python\n'+C.sort+'\n```';
if(q.indexOf('javascript')!==-1||q.indexOf('js')!==-1)return'```javascript\nconst greet=(n)=>"Hello, "+n+"!";\nconsole.log(greet("World"));\n```';
return'```python\n'+C.fib+'\n```'}
if(/(\d+)\s*\+\s*(\d+)/.test(q)){var m=q.match(/(\d+)\s*\+\s*(\d+)/);return m[1]+' + '+m[2]+' = '+(parseInt(m[1])+parseInt(m[2]))}
if(/(\d+)\s*\*\s*(\d+)/.test(q)){var m=q.match(/(\d+)\s*\*\s*(\d+)/);return m[1]+' * '+m[2]+' = '+(parseInt(m[1])*parseInt(m[2]))}
if(/sqrt\s*(?:of\s*)?(\d+)/i.test(q)){var m=q.match(/sqrt\s*(?:of\s*)?(\d+)/i);return'sqrt('+m[1]+') = '+Math.sqrt(parseInt(m[1])).toFixed(4)}
if(q.indexOf('pi')!==-1)return'Pi = '+Math.PI.toFixed(10);
for(var k in K)if(q.indexOf(k)!==-1)return K[k];
if(['hello','hi','hey'].some(function(w){return q.indexOf(w)!==-1}))return"Hello! I'm Qythera. Ask about programming, science, math, or code.";
if(q.indexOf('who are you')!==-1||q.indexOf('what are you')!==-1)return"I'm Qythera, built from scratch. No external AI APIs.";
return"I can help with programming, science, math, or code generation. Try asking about a specific topic!"}

document.getElementById('inp').focus();
</script>
</body>
</html>
