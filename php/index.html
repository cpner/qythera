<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qythera AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#09090b;color:#fafafa;font-family:system-ui,sans-serif;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 40%,rgba(124,58,237,.06),transparent 60%),#09090b}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:16px}
.mu{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(59,130,246,.08));border:1px solid rgba(124,58,237,.1);border-radius:16px 16px 4px 16px;padding:12px 16px;max-width:82%;margin-left:auto}
.ma{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px 16px 16px 4px;padding:12px 16px;max-width:88%}
.ib{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:10px 16px}
.ib:focus-within{border-color:rgba(124,58,237,.4);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#a78bfa;margin:0 2px;animation:d 1.4s ease-in-out infinite;opacity:.4}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes d{0%,60%,100%{opacity:.2;transform:scale(.85)}30%{opacity:1;transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@media(max-width:768px){.mu,.ma{max-width:92%!important;padding:10px 12px}body{font-size:15px}}
</style>
</head>
<body>
<div class="bg"></div>
<div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column">
<div class="glass" style="margin:8px;padding:10px 16px;display:flex;align-items:center;gap:10px">
  <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="color:white;font-weight:bold;font-size:14px">Q</span></div>
  <div><div style="font-weight:600;font-size:14px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Qythera</div><div style="font-size:10px;color:#52525b">Vaelon AI</div></div>
  <div style="margin-left:auto;font-size:10px;color:#52525b" id="cnt">0</div>
</div>
<div id="msgs" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px">
  <div id="wel" style="text-align:center;padding:40px 16px">
    <div style="width:80px;height:80px;margin:0 auto 24px;border-radius:20px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(124,58,237,.25);animation:float 5s ease-in-out infinite"><span style="font-size:32px">✦</span></div>
    <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Welcome to Qythera</h2>
    <p style="color:#52525b;font-size:13px;max-width:320px;margin:0 auto 24px">Ask me about coding, science, math.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px;margin:0 auto">
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('Write a Python sorting algorithm')">💻 Sorting</button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('Explain transformers')">🧠 Transformers</button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('What is machine learning?')">🔬 ML</button>
      <button class="glass" style="padding:12px;text-align:left;cursor:pointer;border:none" onclick="S('What is 2+2?')">🔢 Math</button>
    </div>
  </div>
</div>
<div style="padding:8px 12px 12px">
  <div class="ib" style="display:flex;align-items:end;gap:8px">
    <textarea id="inp" placeholder="Message Qythera..." rows="1" style="flex:1;background:transparent;border:none;color:white;outline:none;resize:none;font-size:13.5px;padding:4px 0;max-height:160px" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,160)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();S()}"></textarea>
    <button onclick="S()" style="padding:10px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;color:white;cursor:pointer;flex-shrink:0">➤</button>
  </div>
</div>
</div>
<script>
var API='api.php';
var K={"python":"Python is a high-level programming language created by Guido van Rossum in 1991.","javascript":"JavaScript is a programming language for web development.","transformer":"Transformers use self-attention to process sequences.","machine_learning":"Machine learning: systems learn patterns from data.","git":"Git is a distributed version control system.","physics":"Newton laws: F=ma. Conservation of energy.","math":"Algebra uses symbols for numbers.","ai":"Artificial Intelligence: systems performing tasks requiring human intelligence.","llm":"Large Language Models: neural networks trained on text."};

function S(t){var i=document.getElementById('inp');var m=t||i.value.trim();if(!m)return;if(t)i.value='';var w=document.getElementById('wel');if(w)w.remove();var d=document.getElementById('msgs');
var u=document.createElement('div');u.className='mu';u.innerHTML='<div style="font-size:13px;white-space:pre-wrap">'+H(m)+'</div>';d.appendChild(u);
var ty=document.createElement('div');ty.className='ma';ty.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';d.appendChild(ty);d.scrollTop=d.scrollHeight;
fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:m}]})}).then(function(r){return r.json()}).then(function(d){
ty.remove();var r=d.choices[0].message.content;var b=document.createElement('div');b.className='ma';b.innerHTML='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center"><span style="font-size:8px;color:white;font-weight:bold">Q</span></div><span style="font-size:11px;color:rgba(167,139,250,.7)">Vaelon</span></div><div style="font-size:13px;line-height:1.65;white-space:pre-wrap">'+F(r)+'</div>';d.appendChild(b);d.scrollTop=d.scrollHeight;document.getElementById('cnt').textContent=parseInt(document.getElementById('cnt').textContent)+1}).catch(function(e){ty.remove();var err=document.createElement('div');err.className='ma';err.innerHTML='<div style="color:#ef4444">Error: '+e.message+'</div>';d.appendChild(err);d.scrollTop=d.scrollHeight})}

function H(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function F(t){return H(t).replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre style="background:rgba(0,0,0,.4);border-radius:8px;padding:12px;overflow-x:auto"><code style="font-size:12px;color:#a5f3fc">$2</code></pre>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')}
function G(q){q=q.toLowerCase().trim();for(var k in K)if(q.indexOf(k)!==-1)return K[k];if(q.indexOf('hello')!==-1||q.indexOf('hi')!==-1)return"Hello! Ask about programming, science, math.";return"I can help with programming, science, math. Try a specific topic!"}
document.getElementById('inp').focus();
</script>
</body>
</html>
