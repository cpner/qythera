model:
  name: vaelon-70b
  config: vaelon_70b
  pretrained_path: null
training:
  output_dir: ./outputs/vaelon-70b-moe
  num_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 64
  learning_rate: 5e-6
  weight_decay: 0.01
  warmup_ratio: 0.01
  lr_scheduler: cosine
  max_seq_len: 8192
  bf16: true
deepspeed:
  enabled: true
  config: training/pretrain/deepspeed_config.json
moe:
  num_experts: 64
  num_experts_per_tok: 8
  aux_loss_weight: 0.01
