model:
  name: vaelon-13b
  config: vaelon_13b
  pretrained_path: null
training:
  output_dir: ./outputs/vaelon-13b-full
  num_epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1e-5
  weight_decay: 0.01
  warmup_ratio: 0.01
  lr_scheduler: cosine
  max_seq_len: 4096
  bf16: true
deepspeed:
  enabled: true
  config: training/pretrain/deepspeed_config.json
