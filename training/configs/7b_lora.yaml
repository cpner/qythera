model:
  name: vaelon-7b
  config: vaelon_7b
  pretrained_path: null
training:
  output_dir: ./outputs/vaelon-7b-lora
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler: cosine
  max_seq_len: 2048
  bf16: true
lora:
  enabled: true
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
