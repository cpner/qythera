apiVersion: apps/v1
kind: Deployment
metadata:
  name: qythera-backend
  labels:
    app: qythera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qythera-backend
  template:
    metadata:
      labels:
        app: qythera-backend
    spec:
      containers:
        - name: backend
          image: qythera:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "16Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
